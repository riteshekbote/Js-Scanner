[AI]
# API base URL (set according to your service)
api_base = https://api.deepseek.com
# Your API Key
api_key =xxxxxxxxxxxxxx
# Model name (e.g. deepseek-chat, gpt-3.5-turbo, llama3, etc.)
model = deepseek-chat
# Temperature (security audit recommended: 0.1)
temperature = 0.1
# Maximum output tokens
max_tokens = 30000
min_confidence = 0.7   # Minimum confidence; findings below this threshold will be filtered
[App]
report_dir = reports
cache_dir = js_cache
auto_open_report = false
