[AI]
# API 基础地址（根据你使用的服务填写）
api_base = https://api.deepseek.com
# 你的 API Key
api_key =xxxxxxxxxxxxxx
# 模型名称（例如 deepseek-chat、gpt-3.5-turbo、llama3 等）
model = deepseek-chat
# 温度参数（安全审计建议 0.1）
temperature = 0.1
# 最大输出 token 数
max_tokens = 30000
min_confidence = 0.7   # 最小置信度，低于此值的发现将被过滤
[App]
report_dir = reports
cache_dir = js_cache
auto_open_report = false
